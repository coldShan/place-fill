<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>place-fill AI 接口授权</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
        padding: 28px;
        border: 1px solid rgba(74, 111, 165, 0.18);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(23, 32, 51, 0.10);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
      }

      p {
        color: #5d6b82;
        line-height: 1.6;
      }

      code {
        display: block;
        padding: 10px 12px;
        border-radius: 10px;
        overflow-wrap: anywhere;
        background: #eef3f9;
        color: #1c3557;
      }

      button {
        justify-self: start;
        padding: 10px 14px;
        border: 0;
        border-radius: 10px;
        background: #4a6fa5;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.62;
      }

      [data-role="status"] {
        min-height: 22px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI 接口授权</h1>
      <p>place-fill 需要获得以下 HTTPS 接口域名的访问权限，才能调用你配置的 OpenAI-compatible 服务。</p>
      <code data-role="origin"></code>
      <button type="button" data-role="grant">授权此接口域名</button>
      <p data-role="status"></p>
    </main>
    <script src="./src/ai-permission-page.js"></script>
  </body>
</html>
